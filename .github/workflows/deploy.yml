name: Production Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend to public S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete --exclude ".env" --exclude ".env.*"
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          SOURCE_DIR: ./front-end

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Validate BACKEND secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BACKEND_BUCKET: ${{ secrets.AWS_BACKEND_BUCKET }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          required_vars=(AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_BACKEND_BUCKET AWS_S3_BUCKET)
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Missing required GitHub secret: $var"
              exit 1
            fi
          done
          echo "All required BACKEND secrets are present."

      - name: Download private env file from BACKEND bucket
        run: |
          if aws s3 cp s3://${{ secrets.AWS_BACKEND_BUCKET }}/private/.env .env; then
            echo "Loaded private env file from BACKEND bucket."
          else
            echo "No private env file found in BACKEND bucket; continuing without it."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Package Backend
        run: |
          cd backend
          npm install --production
          if [ -f ../.env ]; then
            cp ../.env .env
          fi
          zip -r ../backend.zip .
          cd ..

      - name: Apply environment variables to Lambda
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT }}
          SENTRY_RELEASE: ${{ secrets.SENTRY_RELEASE }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          function_name = 'purpose-investor-network-backend-pin-backend'
          env_path = Path('.env')
          env_values = {}
          reserved_keys = {
              'AWS_ACCESS_KEY_ID', 'AWS_SECRET_ACCESS_KEY', 'AWS_SESSION_TOKEN',
              'AWS_DEFAULT_REGION', 'AWS_REGION', 'AWS_PROFILE', 'AWS_SHARED_CREDENTIALS_FILE',
              'AWS_LAMBDA_FUNCTION_NAME', 'AWS_EXECUTION_ENV', 'AWS_PATH', 'PATH'
          }

          if env_path.exists():
              with env_path.open('r', encoding='utf-8') as handle:
                  for raw_line in handle.read().splitlines():
                      line = raw_line.strip()
                      if not line or line.startswith('#') or '=' not in line:
                          continue
                      key, value = line.split('=', 1)
                      key = key.strip()
                      if key not in reserved_keys:
                          env_values[key] = value.strip()
          else:
              print('No .env file found; using workflow values and existing Lambda configuration.')

          for key in ('ADMIN_USER', 'ADMIN_PASS', 'SESSION_SECRET', 'SENTRY_DSN', 'SENTRY_ENVIRONMENT', 'SENTRY_RELEASE', 'SENTRY_TRACES_SAMPLE_RATE', 'AWS_S3_BUCKET'):
              value = os.getenv(key)
              if value:
                  env_values[key] = value

          try:
              current_output = subprocess.check_output([
                  'aws', 'lambda', 'get-function-configuration',
                  '--function-name', function_name,
                  '--query', 'Environment.Variables',
                  '--output', 'json'
              ], text=True)
              current = json.loads(current_output) if current_output.strip() else {}
          except subprocess.CalledProcessError as exc:
              print(f'Lambda function not found yet; continuing with empty environment config: {exc}')
              current = {}

          current.update({
              'ADMIN_USER': env_values.get('ADMIN_USER', current.get('ADMIN_USER', 'admin')),
              'ADMIN_PASS': env_values.get('ADMIN_PASS', current.get('ADMIN_PASS', 'password')),
              'SESSION_SECRET': env_values.get('SESSION_SECRET', current.get('SESSION_SECRET', '')),
              'SENTRY_DSN': env_values.get('SENTRY_DSN', current.get('SENTRY_DSN', '')),
              'SENTRY_ENVIRONMENT': env_values.get('SENTRY_ENVIRONMENT', current.get('SENTRY_ENVIRONMENT', 'production')),
              'SENTRY_RELEASE': env_values.get('SENTRY_RELEASE', current.get('SENTRY_RELEASE', 'purpose-investor-network@latest')),
              'SENTRY_TRACES_SAMPLE_RATE': env_values.get('SENTRY_TRACES_SAMPLE_RATE', current.get('SENTRY_TRACES_SAMPLE_RATE', '0.0')),
              'AWS_S3_BUCKET': env_values.get('AWS_S3_BUCKET', current.get('AWS_S3_BUCKET', '')),
          })

          try:
              subprocess.check_call([
                  'aws', 'lambda', 'update-function-configuration',
                  '--function-name', function_name,
                  '--environment', json.dumps({'Variables': current})
              ])
              print('Updated Lambda environment variables.')
          except subprocess.CalledProcessError as exc:
              print(f'Skipping Lambda environment update because the function is not available yet: {exc}')
          PY

      - name: Upload private env file to BACKEND bucket
        run: |
          if [ -f .env ]; then
            aws s3 cp .env s3://${{ secrets.AWS_BACKEND_BUCKET }}/private/.env --acl private
          else
            echo "No local .env file available to upload."
          fi

      - name: Upload Zip to BACKEND S3 Bucket
        run: |
          aws s3 cp backend.zip s3://${{ secrets.AWS_BACKEND_BUCKET }}/dist/backend.zip

      - name: Create Lambda if missing
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT }}
          SENTRY_RELEASE: ${{ secrets.SENTRY_RELEASE }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_BACKEND_BUCKET: ${{ secrets.AWS_BACKEND_BUCKET }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          function_name = 'purpose-investor-network-backend-pin-backend'
          role_name = 'purpose-investor-network-backend-role'
          bucket_name = os.environ['AWS_BACKEND_BUCKET']

          env_vars = {
              'ADMIN_USER': os.getenv('ADMIN_USER', 'admin'),
              'ADMIN_PASS': os.getenv('ADMIN_PASS', 'password'),
              'SESSION_SECRET': os.getenv('SESSION_SECRET', ''),
              'SENTRY_DSN': os.getenv('SENTRY_DSN', ''),
              'SENTRY_ENVIRONMENT': os.getenv('SENTRY_ENVIRONMENT', 'production'),
              'SENTRY_RELEASE': os.getenv('SENTRY_RELEASE', 'purpose-investor-network@latest'),
              'SENTRY_TRACES_SAMPLE_RATE': os.getenv('SENTRY_TRACES_SAMPLE_RATE', '0.0'),
              'AWS_S3_BUCKET': os.getenv('AWS_S3_BUCKET', ''),
          }

          try:
              subprocess.check_output([
                  'aws', 'lambda', 'get-function',
                  '--function-name', function_name,
                  '--query', 'Configuration.FunctionName',
                  '--output', 'text'
              ], text=True)
              print('Lambda already exists; skipping creation.')
          except subprocess.CalledProcessError:
              print('Creating Lambda function for first deployment...')

              try:
                  subprocess.check_output(['aws', 'iam', 'get-role', '--role-name', role_name], text=True)
              except subprocess.CalledProcessError:
                  subprocess.check_call([
                      'aws', 'iam', 'create-role',
                      '--role-name', role_name,
                      '--assume-role-policy-document', json.dumps({
                          'Version': '2012-10-17',
                          'Statement': [{
                              'Effect': 'Allow',
                              'Principal': {'Service': 'lambda.amazonaws.com'},
                              'Action': 'sts:AssumeRole'
                          }]
                      })
                  ])

              subprocess.check_call([
                  'aws', 'iam', 'attach-role-policy',
                  '--role-name', role_name,
                  '--policy-arn', 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
              ], stdout=subprocess.DEVNULL, stderr=subprocess.STDOUT)

              role_arn = subprocess.check_output([
                  'aws', 'iam', 'get-role', '--role-name', role_name, '--query', 'Role.Arn', '--output', 'text'
              ], text=True).strip()

              subprocess.check_call([
                  'aws', 'lambda', 'create-function',
                  '--function-name', function_name,
                  '--runtime', 'nodejs18.x',
                  '--role', role_arn,
                  '--handler', 'lambda.handler',
                  '--code', f'S3Bucket={bucket_name},S3Key=dist/backend.zip',
                  '--timeout', '20',
                  '--memory-size', '512',
                  '--environment', json.dumps({'Variables': env_vars})
              ])
              print('Lambda created successfully.')
          PY

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name purpose-investor-network-backend-pin-backend \
            --s3-bucket ${{ secrets.AWS_BACKEND_BUCKET }} \
            --s3-key dist/backend.zip